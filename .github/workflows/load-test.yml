name: Baseline Load Testing

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  load-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install aiohttp

    - name: Run Load Test
      run: |
        python automated_test/load_test.py

    - name: Upload Load Test Reports
      uses: actions/upload-artifact@v4
      with:
        name: load-test-reports
        path: |
          automated_test/load_test_summary.csv
          automated_test/load_test_details.csv
